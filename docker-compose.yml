name: marketplace

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalog}
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import

  catalog:
    build:
      context: .
      dockerfile: src/Services/Catalog/Marketplace.Catalog.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CatalogDb: "Host=postgres;Port=5432;Database=${CATALOG_DB_NAME:-catalog};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Keycloak__Audience: account
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  merchant:
    build:
      context: .
      dockerfile: src/Services/Merchant/Marketplace.Merchant.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MerchantDb: "Host=postgres;Port=5432;Database=merchant;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Secrets__EncryptionKey: ${MERCHANT_ENCRYPTION_KEY:-MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
      Internal__ApiKey: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory:
    build:
      context: .
      dockerfile: src/Services/Inventory/Marketplace.Inventory.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__InventoryDb: "Host=postgres;Port=5432;Database=inventory;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order:
    build:
      context: .
      dockerfile: src/Services/Order/Marketplace.Order.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__OrderDb: "Host=postgres;Port=5432;Database=ordering;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  shopifysync:
    build:
      context: .
      dockerfile: src/Services/ShopifySync/Marketplace.ShopifySync.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShopifyDb: "Host=postgres;Port=5432;Database=shopifysync;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Merchant__InternalBaseUrl: "http://merchant:8080"
      Internal__ApiKey: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      Secrets__EncryptionKey: ${MERCHANT_ENCRYPTION_KEY:-MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
      Shopify__ClientMode: ${SHOPIFY_CLIENT_MODE:-simulator}
      Shopify__WebhookSecret: ${SHOPIFY_WEBHOOK_SECRET:-dev-shopify-webhook-secret}
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment:
    build:
      context: .
      dockerfile: src/Services/Payment/Marketplace.Payment.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PaymentDb: "Host=postgres;Port=5432;Database=payment;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Merchant__InternalBaseUrl: "http://merchant:8080"
      Internal__ApiKey: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      Payment__Mode: ${PAYMENT_MODE:-simulator}
    ports:
      - "8087:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Marketplace.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog__Address: "http://catalog:8080/"
      ReverseProxy__Clusters__merchant-cluster__Destinations__merchant__Address: "http://merchant:8080/"
      ReverseProxy__Clusters__inventory-cluster__Destinations__inventory__Address: "http://inventory:8080/"
      ReverseProxy__Clusters__order-cluster__Destinations__order__Address: "http://order:8080/"
      ReverseProxy__Clusters__shopify-cluster__Destinations__shopify__Address: "http://shopifysync:8080/"
      ReverseProxy__Clusters__payment-cluster__Destinations__payment__Address: "http://payment:8080/"
    ports:
      - "8081:8080"
    depends_on:
      - catalog
      - merchant
      - inventory
      - order
      - shopifysync
      - payment
