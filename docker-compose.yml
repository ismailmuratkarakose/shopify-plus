name: marketplace

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import

  # Store (mağaza) hesabı + şifreli Shopify entegrasyon config
  merchant:
    build:
      context: .
      dockerfile: src/Services/Merchant/Marketplace.Merchant.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MerchantDb: "Host=postgres;Port=5432;Database=merchant;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Keycloak__BaseUrl: "http://keycloak:8080"
      Keycloak__Realm: "marketplace"
      Keycloak__AdminClientId: ${KEYCLOAK_ADMIN_CLIENT_ID:-marketplace-admin-api}
      Keycloak__AdminClientSecret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-dev-admin-api-secret-change-me}
      Secrets__EncryptionKey: ${MERCHANT_ENCRYPTION_KEY:-MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
      Internal__ApiKey: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Store Data: Shopify bağlama (OAuth) + read-model senkronu (ürün/koleksiyon...)
  cms:
    build:
      context: .
      dockerfile: src/Services/Cms/Marketplace.Cms.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CmsDb: "Host=postgres;Port=5432;Database=cms;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Services__ShopifySync: "http://shopifysync:8080"
      Media__LocalRoot: "/app/media"
    volumes:
      - ./.data/cms-media:/app/media
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mobile:
    build:
      context: .
      dockerfile: src/Services/Mobile/Marketplace.Mobile.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MobileDb: "Host=postgres;Port=5432;Database=mobile;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Services__Cms: "http://cms:8080"
      Services__ShopifySync: "http://shopifysync:8080"
      Experience__CacheTtlSeconds: ${EXPERIENCE_CACHE_TTL_SEC:-30}
    ports:
      - "8088:8080"
    depends_on:
      postgres:
        condition: service_healthy

  shopifysync:
    build:
      context: .
      dockerfile: src/Services/ShopifySync/Marketplace.ShopifySync.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ShopifyDb: "Host=postgres;Port=5432;Database=shopifysync;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASS:-guest}
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      Merchant__InternalBaseUrl: "http://merchant:8080"
      Internal__ApiKey: ${INTERNAL_API_KEY:-dev-internal-key-change-me}
      Secrets__EncryptionKey: ${MERCHANT_ENCRYPTION_KEY:-MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}
      Shopify__ClientMode: ${SHOPIFY_CLIENT_MODE:-simulator}
      Shopify__WebhookSecret: ${SHOPIFY_WEBHOOK_SECRET:-dev-shopify-webhook-secret}
      # Lokal geliştirmede mutabakat kısa aralıkla çalışır (prod varsayılanı 60 dk).
      Sync__Reconciliation__Enabled: ${SYNC_RECONCILIATION_ENABLED:-true}
      Sync__Reconciliation__IntervalMinutes: ${SYNC_RECONCILIATION_INTERVAL_MIN:-1}
      Sync__Reconciliation__InitialDelaySeconds: ${SYNC_RECONCILIATION_INITIAL_DELAY_SEC:-20}
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: src/Gateway/Marketplace.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Authority: "http://keycloak:8080/realms/marketplace"
      ReverseProxy__Clusters__merchant-cluster__Destinations__merchant__Address: "http://merchant:8080/"
      ReverseProxy__Clusters__shopify-cluster__Destinations__shopify__Address: "http://shopifysync:8080/"
      ReverseProxy__Clusters__cms-cluster__Destinations__cms__Address: "http://cms:8080/"
      ReverseProxy__Clusters__mobile-cluster__Destinations__mobile__Address: "http://mobile:8080/"
    ports:
      - "8081:8080"
    depends_on:
      - merchant
      - shopifysync
      - cms
      - mobile
